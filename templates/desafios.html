{% extends "base.html" %}

{% block content %}

<h1 class="page-title">Desafios / Metas</h1>

<!-- FORM -->
<div class="card">
    <h3>Nova meta</h3>

    <form method="POST" class="form form-desafio">

        <div class="form-grid">
            <input name="titulo" placeholder="Título" required>
            <input name="descricao" placeholder="Descrição">
            <input name="valor_meta" type="number" step="0.01" placeholder="Meta (R$)">
            <input name="valor_atual" type="number" step="0.01" placeholder="Atual (R$)">
            <input name="data_limite" type="date">
            <input name="link" placeholder="Link (opcional)">
        </div>

        <button type="submit">Criar</button>
    </form>
</div>

<!-- LISTA -->
<div class="card">
    <h3>Minhas metas</h3>

    <div class="lista-desafios">
        {% for d in desafios %}
            <div class="desafio-item {% if d.concluido %}concluido{% endif %}">

                <div class="info">
                    <div class="topo">
                        <input type="checkbox"
                               onclick="window.location='/desafios/toggle/{{ d.id }}'"
                               {% if d.concluido %}checked{% endif %}>

                        <strong>{{ d.titulo }}</strong>
                    </div>

                    <span class="text-muted">
                        {{ d.descricao or "Sem descrição" }}
                    </span>

                    {% if d.link %}
                        <a href="{{ d.link }}" target="_blank" class="link">🔗 Ver meta</a>
                    {% endif %}
                </div>

                <div class="progresso">
                    <span>
                        R$ {{ d.valor_atual }} / {{ d.valor_meta }}
                    </span>

                    <div class="barra">
                        <div class="barra-fill"
                            style="width: {{ d.percentual }}%;
                            background: {{ 'green' if d.percentual >= 100 else 'blue' }}">
                        </div>
                    </div>
                </div>

            </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
